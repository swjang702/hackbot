<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>hackbot</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg-primary: #0d1117;
        --bg-secondary: #161b22;
        --bg-tertiary: #21262d;
        --border: #30363d;
        --text-primary: #e6edf3;
        --text-secondary: #8b949e;
        --text-muted: #484f58;
        --accent: #58a6ff;
        --accent-dim: #1f6feb;
        --green: #3fb950;
        --yellow: #d29922;
        --red: #f85149;
        --orange: #d18616;
        --purple: #bc8cff;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        background: var(--bg-primary);
        color: var(--text-primary);
        font-family: "JetBrains Mono", "Fira Code", "Cascadia Code", monospace;
        font-size: 13px;
        overflow: hidden;
      }

      #app {
        width: 100%;
        height: 100%;
        display: grid;
        grid-template-columns: 1fr 360px;
        grid-template-rows: 1fr auto;
        gap: 1px;
        background: var(--border);
      }

      .panel {
        background: var(--bg-primary);
        overflow: hidden;
        position: relative;
      }

      .panel-header {
        height: 28px;
        display: flex;
        align-items: center;
        padding: 0 10px;
        background: var(--bg-secondary);
        border-bottom: 1px solid var(--border);
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--text-secondary);
        user-select: none;
      }

      /* Game view — takes all available space on left */
      #game-panel {
        grid-column: 1;
        grid-row: 1;
      }
      #game-canvas-container {
        width: 100%;
        height: calc(100% - 28px);
        overflow: hidden;
      }

      /* Right sidebar: event log + controls stacked */
      #sidebar {
        grid-column: 2;
        grid-row: 1;
        display: flex;
        flex-direction: column;
        background: var(--bg-primary);
        border-left: 1px solid var(--border);
      }

      /* Event log */
      #event-log-panel {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-height: 0;
      }
      #event-log {
        flex: 1;
        overflow-y: auto;
        padding: 4px 8px;
        font-size: 11px;
        line-height: 1.6;
      }
      #event-log::-webkit-scrollbar {
        width: 6px;
      }
      #event-log::-webkit-scrollbar-thumb {
        background: var(--bg-tertiary);
        border-radius: 3px;
      }
      .log-entry {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .log-ts {
        color: var(--text-muted);
      }
      .log-pid {
        color: var(--accent);
      }
      .log-syscall {
        color: var(--green);
      }
      .log-gpu {
        color: var(--purple);
      }
      .log-sched {
        color: var(--yellow);
      }
      .log-power {
        color: var(--orange);
      }
      .log-process {
        color: var(--red);
      }

      /* Controls panel */
      #controls-panel {
        border-top: 1px solid var(--border);
        max-height: 200px;
      }
      #controls-content {
        padding: 8px;
      }
      .control-group {
        margin-bottom: 8px;
      }
      .control-label {
        font-size: 10px;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 4px;
      }
      .filter-chips {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
      }
      .chip {
        display: inline-flex;
        align-items: center;
        padding: 2px 8px;
        border-radius: 10px;
        font-size: 11px;
        cursor: pointer;
        user-select: none;
        background: var(--bg-tertiary);
        color: var(--text-secondary);
        border: 1px solid var(--border);
        transition: all 0.15s;
      }
      .chip.active {
        background: var(--accent-dim);
        color: var(--text-primary);
        border-color: var(--accent);
      }

      /* Timeline bar — full width bottom */
      #timeline-panel {
        grid-column: 1 / -1;
        grid-row: 2;
        border-top: 1px solid var(--border);
      }
      #timeline-content {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 12px;
        height: 40px;
      }
      .timeline-btn {
        background: var(--bg-tertiary);
        border: 1px solid var(--border);
        color: var(--text-primary);
        padding: 3px 10px;
        border-radius: 4px;
        cursor: pointer;
        font-family: inherit;
        font-size: 12px;
        transition: background 0.15s;
      }
      .timeline-btn:hover {
        background: var(--accent-dim);
      }
      .timeline-btn.active {
        background: var(--accent-dim);
        border-color: var(--accent);
      }
      #scrub-slider {
        flex: 1;
        height: 4px;
        -webkit-appearance: none;
        appearance: none;
        background: var(--bg-tertiary);
        border-radius: 2px;
        outline: none;
      }
      #scrub-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: var(--accent);
        cursor: pointer;
      }
      #timeline-position {
        color: var(--text-secondary);
        font-size: 11px;
        min-width: 120px;
        text-align: right;
      }

      /* Connection status */
      #connection-status {
        position: fixed;
        top: 6px;
        right: 6px;
        font-size: 10px;
        color: var(--text-muted);
        z-index: 100;
      }
      #connection-status.connected {
        color: var(--green);
      }
    </style>
  </head>
  <body>
    <div id="app">
      <!-- Game view -->
      <div id="game-panel" class="panel">
        <div class="panel-header">Game View</div>
        <div id="game-canvas-container"></div>
      </div>

      <!-- Right sidebar -->
      <div id="sidebar">
        <div id="event-log-panel">
          <div class="panel-header">Event Log</div>
          <div id="event-log"></div>
        </div>
        <div id="controls-panel">
          <div class="panel-header">Filters</div>
          <div id="controls-content">
            <div class="control-group">
              <div class="control-label">Processes</div>
              <div id="pid-filters" class="filter-chips"></div>
            </div>
            <div class="control-group">
              <div class="control-label">Event Types</div>
              <div id="type-filters" class="filter-chips"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Timeline -->
      <div id="timeline-panel" class="panel">
        <div id="timeline-content">
          <button id="play-btn" class="timeline-btn">Play</button>
          <button class="timeline-btn speed-btn" data-speed="0.5">0.5x</button>
          <button class="timeline-btn speed-btn active" data-speed="1">1x</button>
          <button class="timeline-btn speed-btn" data-speed="2">2x</button>
          <button class="timeline-btn speed-btn" data-speed="5">5x</button>
          <button class="timeline-btn speed-btn" data-speed="10">10x</button>
          <input id="scrub-slider" type="range" min="0" max="1000" value="0" />
          <span id="timeline-position">0.000s / 0.000s</span>
        </div>
      </div>
    </div>

    <div id="connection-status">disconnected</div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
